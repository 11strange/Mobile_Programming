<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question 1 - Sign In Card</title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 36px 32px;
      width: 360px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), 0 2px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: background-color 0.4s ease;
    }

    .color-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #333;
      transition: color 0.4s ease;
    }

    .card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .card input:focus {
      border-color: #4a90e2;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 4px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 2px solid #236cc1;
      color: #4a90e2;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-cancel:hover {
      background: #e8f0fb;
    }

    .btn-signin {
      flex: 1;
      padding: 12px;
      background: #4a90e2;
      border: none;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-signin:active {
      opacity: 0.75;
      transform: scale(0.97);
    }

    .btn-color {
      padding: 12px 20px;
      background: #555;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-color:active {
      opacity: 0.75;
      transform: scale(0.97);
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <p class="color-label" id="colorLabel">White</p>

  <input type="text" id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />

  <div class="btn-row">
    <button class="btn-cancel" id="cancelBtn">Cancel</button>
    <button class="btn-signin" id="signinBtn">Sign In</button>
  </div>

  <button class="btn-color" id="colorBtn">Change Card Color</button>
</div>

<script>
  const colors = [
    { bg: '#ffffff', name: 'White',       text: '#333333' },
    { bg: '#4a90e2', name: 'Blue',        text: '#ffffff' },
    { bg: '#e74c3c', name: 'Red',         text: '#ffffff' },
    { bg: '#2ecc71', name: 'Green',       text: '#ffffff' },
    { bg: '#f39c12', name: 'Orange',      text: '#ffffff' },
    { bg: '#9b59b6', name: 'Purple',      text: '#ffffff' },
    { bg: '#1abc9c', name: 'Teal',        text: '#ffffff' },
    { bg: '#f1c40f', name: 'Yellow',      text: '#333333' },
  ];

  let colorIndex = 0;

  $('#colorBtn').on('click', function () {
    colorIndex = (colorIndex + 1) % colors.length;
    const c = colors[colorIndex];
    $('#card').css('background-color', c.bg);
    $('#colorLabel').text(c.name).css('color', c.text);
  });

  $('#signinBtn').on('click', function () {
    alert('Signed In Successfully');
  });

  $('#cancelBtn').on('click', function () {
    $('#username').val('');
    $('#password').val('');
  });
</script>

</body>
</html>
